! cEOS startup — eBGP peer of srl1 (AS 65001 <-> 65002)
!
! Topology:
!   host1:eth1 (10.0.1.2) <-- host link --> ceos1:Ethernet1 (10.0.1.1)
!   ceos1:Ethernet2 (10.0.23.1) <-- transit --> srl1:ethernet-1/1 (10.0.23.2)
!
! ceos1 advertises to srl1:
!   - 10.0.1.0/30   (host1 subnet)
!   - 1.1.1.1/32    (loopback / router-id)
!
hostname ceos1
!
username admin privilege 15 role network-admin secret admin
!
ip routing
!
interface Management0
   ip address 172.22.22.11/24
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1
   description to-host1
   no switchport
   ip address 10.0.1.1/30
!
interface Ethernet2
   description to-srl1-transit
   no switchport
   ip address 10.0.23.1/30
!
! --- gNMI (same two-part gotcha as before) ---
management api gnmi
   transport grpc default
      port 6030
   provider eos-native
!
management api netconf
   transport ssh default
!
! --- Remote syslog to the OTel collector (RFC5424 over UDP 5514) ---
logging format hostname fqdn
logging format rfc5424
logging host 172.22.22.30 5514 protocol udp
logging trap informational
!
! --- eBGP to srl1 ---
router bgp 65001
   router-id 1.1.1.1
   neighbor 10.0.23.2 remote-as 65002
   network 1.1.1.1/32
   network 10.0.1.0/30
!
end

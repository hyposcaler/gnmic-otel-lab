################################################################
# gnmic config — streaming gNMI subscriptions → OTLP to collector
################################################################

# Top-level logging — without this, gnmic is nearly silent on stderr.
log: true


# Target device(s)
targets:
  # Arista cEOS — plaintext gRPC on :6030 (no TLS in lab)
  # there's no default cert, we're leaving this plaintext
  # don't do this in prod, nice side effect is we can sniff 
  # the traffic, which is exactly what you don't want in prod
  ceos1:
    address: 172.22.22.11:6030
    username: admin
    password: admin
    insecure: true
    timeout: 10s

  # Nokia SR Linux — gNMI on :57400 with self-signed TLS (containerlab cert)
  srl1:
    address: 172.22.22.12:57400
    username: admin
    password: NokiaSrl1!
    skip-verify: true        # accept containerlab's self-signed cert
    timeout: 10s

# Streaming subscriptions — STREAM mode, SAMPLE
# Encoding: json_ietf works on cEOS with OpenConfig paths
subscriptions:
  # cEOS and SRL accept the origin qualifier, so one subscription works for both.
  port-stats:
    paths:
      - openconfig:/interfaces/interface/state/counters
    mode: stream
    stream-mode: sample
    sample-interval: 10s
    # proto encoding: both platforms emit scalar leaf updates. With
    # json_ietf, SR Linux returns the whole container as one json_ietf_val
    # blob, which gnmic's OTLP exporter silently drops.
    encoding: proto

  system-stats:
    paths:
      - openconfig:/components/component[name=*]/state/memory/available
      - openconfig:/components/component[name=*]/state/memory/utilized
    mode: stream
    stream-mode: sample
    sample-interval: 30s
    # proto encoding: both platforms emit scalar leaf updates. With
    # json_ietf, SR Linux returns the whole container as one json_ietf_val
    # blob, which gnmic's OTLP exporter silently drops.
    encoding: proto

  # BGP neighbor state. session-state is an enum (1=IDLE .. 6=ESTABLISHED);
  # established-transitions counts flaps. Prefix counters are per AFI/SAFI.
  # 30s sample is fine: BGP state changes trigger keepalives/updates anyway
  # and the panels don't need finer resolution than that.
  bgp-neighbors:
    paths:
      - openconfig:/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/session-state
      - openconfig:/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/state/established-transitions
      - openconfig:/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi/state/prefixes/installed
      - openconfig:/network-instances/network-instance/protocols/protocol/bgp/neighbors/neighbor/afi-safis/afi-safi/state/prefixes/received
    mode: stream
    stream-mode: sample
    sample-interval: 30s
    encoding: proto

  # Interface oper/admin state + last-change timestamp. on-change gets us
  # immediate flap events with no polling overhead; heartbeat-interval
  # re-sends the current value every 60s so Prometheus never goes past its
  # 5m lookback-delta and the series stays queryable during steady state.
  intf-state:
    paths:
      - openconfig:/interfaces/interface/state/oper-status
      - openconfig:/interfaces/interface/state/admin-status
      - openconfig:/interfaces/interface/state/last-change
    mode: stream
    stream-mode: on-change
    heartbeat-interval: 60s
    encoding: proto

# Event processors — applied to each gnmic event before it's handed to the output
processors:
  # cEOS appears to freeze the gNMI Notification timestamp on unchanged leaves (e.g.
  # memory/available never resamples). gnmic's OTLP converter uses that
  # notification ts as the datapoint ts, so Prometheus sees the same ancient
  # point forever and drops the series past the 5m lookback-delta.
  # Rewriting the event timestamp to "now" makes every forwarded sample look
  # fresh to Prometheus. This loses true sample-time fidelity.
  stamp-now:
    event-override-ts:
      precision: ns

  # oper-status/admin-status arrive as enum strings ("UP", "DOWN", ...).
  # gnmic's OTLP output silently drops non-numeric values, so these never
  # reach Prometheus. Two-step fix: string-replace each enum identity with
  # its integer code, then cast the stringy result to int.
  # Mapping follows the OpenConfig interfaces-oper-state-type ordering.
  oper-state-to-int:
    event-strings:
      value-names:
        - ".*oper-status$"
        - ".*admin-status$"
      transforms:
        - replace: { apply-on: "value", old: "UP",               new: "1" }
        - replace: { apply-on: "value", old: "DOWN",             new: "2" }
        - replace: { apply-on: "value", old: "TESTING",          new: "3" }
        - replace: { apply-on: "value", old: "UNKNOWN",          new: "4" }
        - replace: { apply-on: "value", old: "DORMANT",          new: "5" }
        - replace: { apply-on: "value", old: "NOT_PRESENT",      new: "6" }
        - replace: { apply-on: "value", old: "LOWER_LAYER_DOWN", new: "7" }

  # oper-state-to-int converts the text to numbers, but we still
  # need to cast the metric to an int
  oper-state-cast-int:
    event-convert:
      value-names:
        - ".*oper-status$"
        - ".*admin-status$"
      type: int

# OTLP output — native OTLP/gRPC to the OTel Collector
outputs:
  otlp-collector:
    type: otlp
    endpoint: otelcol:4317
    protocol: grpc
    timeout: 10s
    # Collector's OTLP gRPC receiver is plaintext (no tls: block in otelcol.yaml),
    # so gnmic must NOT negotiate TLS — omit the tls: block entirely. Do not do this
    # in prod
    batch-size: 500
    interval: 5s
    buffer-size: 1000
    max-retries: 3

    # Namespace + subscription name in the metric name
    metric-prefix: gnmic
    append-subscription-name: true

    counter-patterns:
      - "counter"
      - "octets|packets|bytes"
      - "errors|discards|drops"

    resource-tag-keys:
      - source
      - target

    # Static Resource attributes — follow OTel semconv where possible
    resource-attributes:
      service.name: gnmic
      service.namespace: network-telemetry
      deployment.environment: lab

    event-processors:
      - oper-state-to-int
      - oper-state-cast-int
      - stamp-now

    num-workers: 2
    enable-metrics: true       # expose gnmic's own metrics on :9804

# gnmic's own telemetry for the collector itself (debugging)
api-server:
  address: ":7890"
  enable-metrics: true     # exposes /metrics on the api-server port
  debug: false

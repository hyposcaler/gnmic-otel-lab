name: gnmic-otel-lab

mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.22.22.0/24

topology:
  kinds:
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    # ---- Routers ------------------------------------------------------
    # Arista cEOS — eBGP AS 65001, peer of srl1
    ceos1:
      kind: arista_ceos
      image: ceos:4.30.10M
      mgmt-ipv4: 172.22.22.11
      startup-config: configs/ceos1-startup.cfg

    # Nokia SR Linux — eBGP AS 65002, peer of ceos1. gNMI on :57400 (TLS).
    # Pinned to 24.10.1: routing-policy schema changed in 26.x (match prefix-set
    # was restructured), so this tag keeps us compatible with the srl-labs
    # reference config patterns.
    srl1:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:26.3.1
      mgmt-ipv4: 172.22.22.12
      startup-config: configs/srl1-startup.cli

    # ---- Hosts (multitool image ships iperf3) -------------------------
    # host1 — iperf3 server, attached to ceos1.
    host1:
      kind: linux
      mgmt-ipv4: 172.22.22.31
      exec:
        - ip address add 10.0.1.2/30 dev eth1
        - ip route add 10.0.2.0/30 via 10.0.1.1 dev eth1
        - iperf3 -s -p 5201 -D

    # host2 — iperf3 client, attached to srl1. Drives via /config/iperf.sh.
    host2:
      kind: linux
      mgmt-ipv4: 172.22.22.32
      binds:
        - configs/host2:/config
      exec:
        - ip address add 10.0.2.2/30 dev eth1
        - ip route add 10.0.1.0/30 via 10.0.2.1 dev eth1

    # gnmic - gNMI collector, exports OTLP
    gnmic:
      kind: linux
      image: ghcr.io/openconfig/gnmic:latest
      mgmt-ipv4: 172.22.22.20
      binds:
        - configs/gnmic.yaml:/app/gnmic.yaml:ro
      cmd: --config /app/gnmic.yaml subscribe

    # OpenTelemetry Collector - OTLP in, Prom remote_write out
    otelcol:
      kind: linux
      image: otel/opentelemetry-collector-contrib:0.150.1
      mgmt-ipv4: 172.22.22.30
      binds:
        - configs/otelcol.yaml:/etc/otelcol-contrib/config.yaml:ro
      ports:
        - 4317:4317   # OTLP gRPC
        - 4318:4318   # OTLP HTTP
        - 1777:1777   # pprof — Go profiling
        - 13133:13133 # health_check — HTTP liveness
        - 5514:5514/udp  # syslog (RFC5424) from routers

    # Loki - log store. Collector pushes via OTLP; Grafana reads.
    loki:
      kind: linux
      image: grafana/loki:3.2.0
      mgmt-ipv4: 172.22.22.60
      binds:
        - configs/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      cmd: --config.file=/etc/loki/loki-config.yml
      ports:
        - 3100:3100

    # Prometheus - receives remote_write, scrape-disabled for most things
    prometheus:
      kind: linux
      image: prom/prometheus:v3.11.2
      mgmt-ipv4: 172.22.22.40
      binds:
        - configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      cmd: >
        --config.file=/etc/prometheus/prometheus.yml
        --web.enable-remote-write-receiver
        --storage.tsdb.path=/prometheus
        --storage.tsdb.retention.time=6h
      ports:
        - 9090:9090

    # Grafana
    grafana:
      kind: linux
      image: grafana/grafana:11.3.1
      mgmt-ipv4: 172.22.22.50
      env:
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      binds:
        - grafana/provisioning:/etc/grafana/provisioning:ro
        - grafana/dashboards:/var/lib/grafana/dashboards:ro
      ports:
        - 3000:3000

  links:
    - endpoints: ["host1:eth1", "ceos1:eth1"]     # 10.0.1.0/30 — host1 <-> ceos1
    - endpoints: ["ceos1:eth2", "srl1:e1-1"]      # 10.0.23.0/30 — eBGP transit
    - endpoints: ["srl1:e1-2", "host2:eth1"]      # 10.0.2.0/30 — srl1 <-> host2

name: gnmic-otel-lab

mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.22.22.0/24

topology:
  kinds:
    linux:
      image: ghcr.io/srl-labs/network-multitool

  nodes:
    ceos1:
      kind: arista_ceos
      image: ceos:4.30.10M
      mgmt-ipv4: 172.22.22.11
      startup-config: configs/ceos1-startup.cfg
    srl1:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux:26.3.1
      mgmt-ipv4: 172.22.22.12
      startup-config: configs/srl1-startup.cli
    host1:
      kind: linux
      mgmt-ipv4: 172.22.22.31
      exec:
        - ip address add 10.0.1.2/30 dev eth1
        - ip route add 10.0.2.0/30 via 10.0.1.1 dev eth1
        - iperf3 -s -p 5201 -D
    host2:
      kind: linux
      mgmt-ipv4: 172.22.22.32
      binds:
        - configs/host2:/config
      exec:
        - ip address add 10.0.2.2/30 dev eth1
        - ip route add 10.0.1.0/30 via 10.0.2.1 dev eth1

    gnmic:
      kind: linux
      image: ghcr.io/openconfig/gnmic:latest
      mgmt-ipv4: 172.22.22.20
      binds:
        - configs/gnmic.yaml:/app/gnmic.yaml:ro
      cmd: --config /app/gnmic.yaml subscribe

    otelcol:
      kind: linux
      image: otel/opentelemetry-collector-contrib:0.150.1
      mgmt-ipv4: 172.22.22.30
      binds:
        - configs/otelcol.yaml:/etc/otelcol-contrib/config.yaml:ro
      ports:
        - 4317:4317   # OTLP gRPC
        - 4318:4318   # OTLP HTTP
        - 1777:1777   # pprof — Go profiling
        - 13133:13133 # health_check — HTTP liveness

    otelcol-snmp:
      kind: linux
      image: otel/opentelemetry-collector-contrib:0.150.1
      mgmt-ipv4: 172.22.22.35
      binds:
        - configs/otelcol-snmp.yaml:/etc/otelcol-contrib/config.yaml:ro

    otelcol-syslog:
      kind: linux
      image: otel/opentelemetry-collector-contrib:0.150.1
      mgmt-ipv4: 172.22.22.36
      binds:
        - configs/otelcol-syslog.yaml:/etc/otelcol-contrib/config.yaml:ro
      ports:
        - 5514:5514/udp  # syslog (RFC5424) from routers

    loki:
      kind: linux
      image: grafana/loki:3.2.0
      mgmt-ipv4: 172.22.22.60
      binds:
        - configs/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      cmd: --config.file=/etc/loki/loki-config.yml
      ports:
        - 3100:3100

    prometheus:
      kind: linux
      image: prom/prometheus:v3.11.2
      mgmt-ipv4: 172.22.22.40
      binds:
        - configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        - configs/prometheus-rules.yml:/etc/prometheus/rules/prometheus-rules.yml:ro
      cmd: >
        --config.file=/etc/prometheus/prometheus.yml
        --web.enable-remote-write-receiver
        --storage.tsdb.path=/prometheus
        --storage.tsdb.retention.time=6h
      ports:
        - 9090:9090

    # Alertmanager — receives alerts from Prometheus, routes/dedupes/fires
    # notifications. Null receiver only in this lab; visit :9093 for the
    # alert state + silences UI.
    alertmanager:
      kind: linux
      image: prom/alertmanager:v0.32.0
      mgmt-ipv4: 172.22.22.70
      binds:
        - configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      cmd: --config.file=/etc/alertmanager/alertmanager.yml
      ports:
        - 9093:9093

    grafana:
      kind: linux
      image: grafana/grafana:11.3.1
      mgmt-ipv4: 172.22.22.50
      env:
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      binds:
        - grafana/provisioning:/etc/grafana/provisioning:ro
        - grafana/dashboards:/var/lib/grafana/dashboards:ro
      ports:
        - 3000:3000

  links:
    - endpoints: ["host1:eth1", "ceos1:eth1"]
    - endpoints: ["ceos1:eth2", "srl1:e1-1"]
    - endpoints: ["srl1:e1-2", "host2:eth1"]
